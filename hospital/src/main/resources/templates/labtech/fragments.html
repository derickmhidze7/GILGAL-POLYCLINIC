<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<!-- ===== HEAD fragment ===== -->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Gilgal Lab — ' + ${pageTitle}">Gilgal Lab</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</th:block>

<!-- ===== SIDEBAR fragment ===== -->
<nav th:fragment="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <i class="bi bi-hospital-fill me-2"></i>Gilgal Polyclinic
        </div>
        <small>Lab Technician Portal</small>
    </div>

    <ul class="sidebar-nav list-unstyled">
        <li th:classappend="${activePage == 'dashboard'} ? 'active'">
            <a th:href="@{/labtech/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
        <li class="nav-section">LABORATORY</li>
        <li th:classappend="${activePage == 'dashboard'} ? 'active'">
            <a th:href="@{/labtech/dashboard}">
                <i class="bi bi-flask-fill me-2"></i>Test Queue
            </a>
        </li>
        <li th:classappend="${activePage == 'lab-catalogue'} ? 'active'">
            <a th:href="@{/labtech/lab-catalogue}">
                <i class="bi bi-journal-medical me-2"></i>Lab Catalogue
            </a>
        </li>
        <li th:classappend="${activePage == 'stock-requests'} ? 'active'">
            <a th:href="@{/labtech/stock-requests}">
                <i class="bi bi-box-arrow-in-down me-2"></i>Stock Requests
            </a>
        </li>
        <li class="nav-section">RECORDS</li>
        <li th:classappend="${activePage == 'history'} ? 'active'">
            <a th:href="@{/labtech/history}">
                <i class="bi bi-clock-history me-2"></i>My History
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <div class="sidebar-user-info">
            <i class="bi bi-person-circle me-1"></i>
            <span sec:authentication="name">Lab Tech</span>
        </div>
        <form th:action="@{/logout}" method="post" class="mt-2">
            <button type="submit" class="btn btn-sm btn-outline-light w-100">
                <i class="bi bi-box-arrow-left me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<!-- ===== TOP-NAV fragment ===== -->
<nav th:fragment="topbar(pageTitle)" class="top-bar">
    <button id="sidebarToggle" class="btn btn-link text-dark ps-0">
        <i class="bi bi-list fs-4"></i>
    </button>
    <span class="top-bar-title ms-2" th:text="${pageTitle}">Lab</span>
    <div class="ms-auto d-flex align-items-center gap-2 top-bar-user">
        <i class="bi bi-person-circle"></i>
        <span sec:authentication="name">Lab Tech</span>
    </div>
</nav>

<!-- ===== FLASH ALERTS fragment ===== -->
<th:block th:fragment="alerts">
    <div th:if="${successMsg}"
         class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}"
         class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</th:block>

<!-- ===== SCRIPTS fragment ===== -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', () => {
            document.getElementById('wrapper').classList.toggle('sidebar-collapsed');
        });
        // Close mobile drawer when tapping outside the sidebar
        document.addEventListener('click', function(e) {
            var wrapper = document.getElementById('wrapper');
            var sidebar = document.getElementById('sidebar');
            var toggle  = document.getElementById('sidebarToggle');
            if (window.innerWidth <= 768
                && wrapper && wrapper.classList.contains('sidebar-collapsed')
                && sidebar && !sidebar.contains(e.target)
                && toggle  && !toggle.contains(e.target)) {
                wrapper.classList.remove('sidebar-collapsed');
            }
        });
    </script>
</th:block>

</body>
</html>
