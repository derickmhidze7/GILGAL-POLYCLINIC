<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<!-- ===== HEAD fragment ===== -->
<th:block th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Gilgal Receptionist — ' + ${pageTitle}">Gilgal Receptionist</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</th:block>

<!-- ===== SIDEBAR fragment ===== -->
<nav th:fragment="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
            <i class="bi bi-hospital-fill me-2"></i>Gilgal Polyclinic
        </div>
        <small>Receptionist Portal</small>
    </div>

    <ul class="sidebar-nav list-unstyled">
        <li th:classappend="${activePage == 'dashboard'} ? 'active'">
            <a th:href="@{/receptionist/dashboard}">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
        <li class="nav-section">PATIENTS</li>
        <li class="submenu-parent" th:classappend="${activePage == 'patients'} ? 'open'">
            <a href="#patientSubmenu" data-bs-toggle="collapse" style="cursor:pointer;">
                <i class="bi bi-person-lines-fill me-2"></i>Patients
                <i class="bi bi-chevron-down submenu-chevron"></i>
            </a>
            <ul id="patientSubmenu" class="sidebar-submenu collapse list-unstyled"
                th:classappend="${activePage == 'patients'} ? 'show'">
                <li th:classappend="${activeSubPage == 'register'} ? 'active'">
                    <a th:href="@{/receptionist/patients/register}"><i class="bi bi-person-plus-fill me-2"></i>Register Patient</a>
                </li>
<li th:classappend="${activeSubPage == 'all'} ? 'active'">
                    <a th:href="@{/receptionist/patients/all}"><i class="bi bi-list-ul me-2"></i>All Patients</a>
                </li>
            </ul>
        </li>
        <li class="nav-section">SCHEDULING</li>
        <li th:classappend="${activePage == 'appointments'} ? 'active'">
            <a th:href="@{/receptionist/appointments}">
                <i class="bi bi-calendar-check-fill me-2"></i>Appointments
            </a>
        </li>
        <li class="nav-section">BILLING</li>
        <li th:classappend="${activePage == 'billing'} ? 'active'">
            <a th:href="@{/receptionist/billing}">
                <i class="bi bi-receipt-cutoff me-2"></i>Billing
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <div class="sidebar-user-info">
            <i class="bi bi-person-circle me-1"></i>
            <span sec:authentication="name">Receptionist</span>
        </div>
        <form th:action="@{/logout}" method="post" class="mt-2">
            <button type="submit" class="btn btn-sm btn-outline-light w-100">
                <i class="bi bi-box-arrow-left me-1"></i>Logout
            </button>
        </form>
    </div>
</nav>

<!-- ===== TOP-NAV fragment ===== -->
<nav th:fragment="topbar(pageTitle)" class="top-bar">
    <button id="sidebarToggle" class="btn btn-link text-dark ps-0">
        <i class="bi bi-list fs-4"></i>
    </button>
    <span class="top-bar-title ms-2" th:text="${pageTitle}">Receptionist</span>
    <div class="ms-auto d-flex align-items-center gap-2 top-bar-user">
        <i class="bi bi-person-circle"></i>
        <span sec:authentication="name">Receptionist</span>
    </div>
</nav>

<!-- ===== FLASH ALERTS fragment ===== -->
<th:block th:fragment="alerts">
    <div th:if="${successMsg}"
         class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}"
         class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</th:block>

<!-- ===== SCRIPTS fragment ===== -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle')?.addEventListener('click', () => {
            document.getElementById('wrapper').classList.toggle('sidebar-collapsed');
        });
        // Close mobile drawer when tapping outside the sidebar
        document.addEventListener('click', function(e) {
            var wrapper = document.getElementById('wrapper');
            var sidebar = document.getElementById('sidebar');
            var toggle  = document.getElementById('sidebarToggle');
            if (window.innerWidth <= 768
                && wrapper && wrapper.classList.contains('sidebar-collapsed')
                && sidebar && !sidebar.contains(e.target)
                && toggle  && !toggle.contains(e.target)) {
                wrapper.classList.remove('sidebar-collapsed');
            }
        });
    </script>
</th:block>

</body>
</html>
