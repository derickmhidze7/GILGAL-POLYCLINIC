<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{receptionist/fragments :: head('All Patients')}"></th:block>
</head>
<body>

<div class="d-flex" id="wrapper">
    <th:block th:replace="~{receptionist/fragments :: sidebar}"></th:block>

    <div id="page-content">
        <th:block th:replace="~{receptionist/fragments :: topbar('All Patients')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{receptionist/fragments :: alerts}"></th:block>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex align-items-center justify-content-between">
                    <span class="fw-semibold">
                        <i class="bi bi-list-ul me-2"></i>All Patients
                    </span>
                    <span class="badge bg-secondary" th:text="${totalPatients}">0</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Full Name</th>
                                <th>National ID</th>
                                <th>Phone</th>
                                <th>Gender</th>
                                <th>Registration Date</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(patients)}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-1"></i>No patients registered yet.
                                </td>
                            </tr>
                            <tr th:each="p, iter : ${patients}">
                                <td class="text-muted small"
                                    th:text="${currentPage * 25 + iter.count}"></td>
                                <td>
                                    <a th:href="@{/receptionist/patients/{id}(id=${p.id})}"
                                       class="fw-semibold text-decoration-none"
                                       th:text="${p.firstName + ' ' + p.lastName}">—</a>
                                    <span th:unless="${p.active}" class="badge bg-secondary ms-1 small">Discharged</span>
                                </td>
                                <td th:text="${p.nationalId != null ? p.nationalId : '—'}">—</td>
                                <td th:text="${p.phone}">—</td>
                                <td th:text="${p.gender}">—</td>
                                <td th:text="${p.registrationDate != null ? #temporals.format(p.registrationDate, 'dd MMM yyyy') : '—'}">—</td>
                                <td>
                                    <a th:href="@{/receptionist/patients/{id}(id=${p.id})}"
                                       class="btn btn-sm btn-outline-primary" title="View Profile">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <!-- Pagination -->
                <div th:if="${totalPages > 1}"
                     class="card-footer bg-white d-flex align-items-center justify-content-between flex-wrap gap-2 py-2 px-3">
                    <small class="text-muted">
                        Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span>
                        &mdash; <span th:text="${totalPatients}"></span> patient<span th:if="${totalPatients != 1}">s</span>
                    </small>
                    <nav>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link" th:href="@{/receptionist/patients/all(page=${currentPage - 1})}">&#8249;</a>
                            </li>
                            <th:block th:with="start=${T(java.lang.Math).max(0, currentPage - 2)}, end=${T(java.lang.Math).min(totalPages - 1, start + 4)}">
                                <li class="page-item" th:each="i : ${#numbers.sequence(start, end)}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link"
                                       th:href="@{/receptionist/patients/all(page=${i})}"
                                       th:text="${i + 1}">1</a>
                                </li>
                            </th:block>
                            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/receptionist/patients/all(page=${currentPage + 1})}">&#8250;</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="~{receptionist/fragments :: scripts}"></th:block>
</body>
</html>
