<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{receptionist/fragments :: head('Dashboard')}"></th:block>
</head>
<body>

<div class="d-flex" id="wrapper">
    <th:block th:replace="~{receptionist/fragments :: sidebar}"></th:block>

    <div id="page-content">
        <th:block th:replace="~{receptionist/fragments :: topbar('Dashboard')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{receptionist/fragments :: alerts}"></th:block>

            <!-- Stat Cards -->
            <div class="row g-4 mb-4">
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="stat-card stat-card--green">
                        <div class="stat-card__icon"><i class="bi bi-person-lines-fill"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${totalPatients}">0</div>
                            <div class="stat-card__label">Active Patients</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="stat-card stat-card--teal">
                        <div class="stat-card__icon"><i class="bi bi-calendar-check-fill"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${#lists.size(recentAppointments)}">0</div>
                            <div class="stat-card__label">Recent Appointments</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-4">
                    <div class="stat-card stat-card--blue">
                        <div class="stat-card__icon"><i class="bi bi-receipt-cutoff"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${totalInvoices}">0</div>
                            <div class="stat-card__label">Total Invoices</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-lightning-charge-fill text-warning me-2"></i>Quick Actions
                </div>
                <div class="card-body d-flex flex-wrap gap-3">
                    <a th:href="@{/receptionist/patients}" class="btn btn-primary">
                        <i class="bi bi-person-plus me-2"></i>Register Patient
                    </a>
                    <a th:href="@{/receptionist/appointments}" class="btn btn-outline-primary">
                        <i class="bi bi-calendar-plus me-2"></i>Book Appointment
                    </a>
                    <a th:href="@{/receptionist/billing}" class="btn btn-outline-secondary">
                        <i class="bi bi-receipt me-2"></i>Create Invoice
                    </a>
                </div>
            </div>

            <!-- Recent Appointments -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-clock-history me-2"></i>Recent Appointments
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Patient</th>
                                <th>Doctor</th>
                                <th>Date &amp; Time</th>
                                <th>Type</th>
                                <th>Status</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="appt : ${recentAppointments}">
                                <td th:text="${appt.patientFullName}">—</td>
                                <td th:text="${appt.doctorFullName != null ? appt.doctorFullName : (appt.appointmentType.name() == 'TRIAGE' ? '—' : 'Unassigned')}">—</td>
                                <td th:text="${#temporals.format(appt.scheduledDateTime, 'dd MMM yyyy HH:mm')}">—</td>
                                <td th:text="${appt.appointmentType}">—</td>
                                <td>
                                    <span th:classappend="${appt.status.name() == 'SCHEDULED'} ? 'badge bg-primary' :
                                                          (${appt.status.name() == 'CONFIRMED'} ? 'badge bg-success' :
                                                          (${appt.status.name() == 'CANCELLED'} ? 'badge bg-danger' :
                                                          (${appt.status.name() == 'COMPLETED'} ? 'badge bg-secondary' : 'badge bg-warning')))"
                                          th:text="${appt.status}">—</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(recentAppointments)}">
                                <td colspan="5" class="text-center text-muted py-3">No appointments found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<th:block th:replace="~{receptionist/fragments :: scripts}"></th:block>
</body>
</html>
