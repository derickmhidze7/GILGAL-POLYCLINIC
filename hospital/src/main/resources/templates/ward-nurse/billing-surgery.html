<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{ward-nurse/fragments :: head('Surgery Bills')}"></th:block>
</head>
<body>

<div class="d-flex" id="wrapper">
    <th:block th:replace="~{ward-nurse/fragments :: sidebar}"></th:block>

    <div id="page-content">
        <th:block th:replace="~{ward-nurse/fragments :: topbar('Surgery Bills')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{ward-nurse/fragments :: alerts}"></th:block>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex align-items-center justify-content-between">
                    <span class="fw-semibold">
                        <i class="bi bi-scissors me-2 text-secondary"></i>Unpaid Surgery Items
                    </span>
                    <small class="text-muted">Pre-op &amp; Post-op items not yet sent for payment</small>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Patient Name</th>
                                <th>Ward / Bed</th>
                                <th>Admit Date</th>
                                <th>Surgeries</th>
                                <th class="text-end">Pre-op Total</th>
                                <th class="text-end">Post-op Total</th>
                                <th class="text-end fw-bold">Total Unpaid</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(surgeries)}">
                                <td colspan="9" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>No unpaid surgery items for active patients.
                                </td>
                            </tr>
                            <tr th:each="s, i : ${surgeries}">
                                <td th:text="${i.count}">1</td>
                                <td class="fw-semibold" th:text="${s.patientFullName}">—</td>
                                <td>
                                    <span th:text="${s.ward ?: '—'}">—</span>
                                    <small class="text-muted ms-1"
                                           th:text="${s.bedNumber != null ? '· Bed ' + s.bedNumber : ''}"></small>
                                </td>
                                <td>
                                    <small th:text="${s.admitDate != null ? #temporals.format(s.admitDate, 'dd MMM yyyy') : '—'}">—</small>
                                </td>
                                <td>
                                    <span class="badge bg-secondary"
                                          th:text="${s.surgeryCount + (s.surgeryCount == 1 ? ' surgery' : ' surgeries')}">—</span>
                                </td>
                                <td class="text-end">
                                    <span th:if="${s.totalPreopUnpaid.doubleValue() > 0}"
                                          class="text-danger fw-semibold"
                                          th:text="${'TZSh ' + #numbers.formatDecimal(s.totalPreopUnpaid, 1, 'COMMA', 0, 'POINT')}">0</span>
                                    <span th:unless="${s.totalPreopUnpaid.doubleValue() > 0}"
                                          class="text-muted">—</span>
                                </td>
                                <td class="text-end">
                                    <span th:if="${s.totalPostopUnpaid.doubleValue() > 0}"
                                          class="text-danger fw-semibold"
                                          th:text="${'TZSh ' + #numbers.formatDecimal(s.totalPostopUnpaid, 1, 'COMMA', 0, 'POINT')}">0</span>
                                    <span th:unless="${s.totalPostopUnpaid.doubleValue() > 0}"
                                          class="text-muted">—</span>
                                </td>
                                <td class="text-end fw-bold text-danger"
                                    th:text="${'TZSh ' + #numbers.formatDecimal(s.totalSurgeryUnpaid, 1, 'COMMA', 0, 'POINT')}">0</td>
                                <td>
                                    <a th:href="@{/ward-nurse/billing/{id}(id=${s.assignmentId})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye me-1"></i>View Items
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="~{ward-nurse/fragments :: scripts}"></th:block>
</body>
</html>
