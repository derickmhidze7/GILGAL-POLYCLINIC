<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{ward-nurse/fragments :: head('Dashboard')}"></th:block>
</head>
<body>

<div class="d-flex" id="wrapper">
    <th:block th:replace="~{ward-nurse/fragments :: sidebar}"></th:block>

    <div id="page-content">
        <th:block th:replace="~{ward-nurse/fragments :: topbar('Ward Dashboard')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{ward-nurse/fragments :: alerts}"></th:block>

            <!-- Stat Cards -->
            <div class="row g-4 mb-4">
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card stat-card--green">
                        <div class="stat-card__icon"><i class="bi bi-people-fill"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${totalPatients}">0</div>
                            <div class="stat-card__label">Total Ward Patients</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card" style="--card-color:#0d6efd">
                        <div class="stat-card__icon"><i class="bi bi-person-plus-fill"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${admittedCount}">0</div>
                            <div class="stat-card__label">Newly Admitted</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card" style="--card-color:#198754">
                        <div class="stat-card__icon"><i class="bi bi-heart-pulse-fill"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${stableCount}">0</div>
                            <div class="stat-card__label">Stable</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card" style="--card-color:#dc3545">
                        <div class="stat-card__icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${criticalCount}">0</div>
                            <div class="stat-card__label">Critical</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Ward Patient Table -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold"><i class="bi bi-hospital me-2 text-primary"></i>Current Ward Patients</span>
                    <a th:href="@{/ward-nurse/patients}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-list me-1"></i>View All
                    </a>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Patient</th>
                                <th>Ward / Bed</th>
                                <th>Status</th>
                                <th>Admitted</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(activeAssignments)}">
                                <td colspan="6" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>No active ward patients.
                                </td>
                            </tr>
                            <tr th:each="a, i : ${activeAssignments}">
                                <td th:text="${i.count}">1</td>
                                <td>
                                    <div class="fw-semibold"
                                         th:text="${a.patient.firstName + ' ' + a.patient.lastName}">—</div>
                                    <small class="text-muted" th:text="${a.patient.nationalId ?: '—'}">—</small>
                                </td>
                                <td>
                                    <span th:text="${a.ward ?: '—'}">—</span><br/>
                                    <small class="text-muted" th:if="${a.bedNumber}"
                                           th:text="'Bed: ' + ${a.bedNumber}">—</small>
                                </td>
                                <td>
                                    <span th:text="${a.status}"
                                          th:classappend="${a.status.name() == 'CRITICAL'} ? 'badge bg-danger' :
                                                           (${a.status.name() == 'STABLE'} ? 'badge bg-success' :
                                                           'badge bg-warning text-dark')">—</span>
                                </td>
                                <td th:text="${#temporals.format(a.admitDate, 'dd MMM yyyy HH:mm')}">—</td>
                                <td>
                                    <a th:href="@{/ward-nurse/patients/{id}/care(id=${a.id})}"
                                       class="btn btn-sm btn-primary">
                                        <i class="bi bi-clipboard2-pulse me-1"></i>Care
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="~{ward-nurse/fragments :: scripts}"></th:block>
</body>
</html>
