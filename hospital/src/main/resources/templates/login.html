<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gilgal Polyclinic — Sign In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="login-body">

<div class="login-wrapper">
    <div class="login-card">
        <!-- Brand -->
        <div class="login-brand">
            <div class="login-icon">
                <i class="bi bi-hospital-fill"></i>
            </div>
            <h2>Gilgal Polyclinic</h2>
            <p class="text-muted">Hospital Management System</p>
        </div>

        <!-- Alerts -->
        <div th:if="${errorMsg}" class="alert alert-danger py-2">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${logoutMsg}" class="alert alert-success py-2">
            <i class="bi bi-check-circle-fill me-1"></i>
            <span th:text="${logoutMsg}"></span>
        </div>

        <!-- Login Form — posts to /login, Spring Security handles authentication -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Enter your username" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter your password" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
    </div>
    <div class="login-footer">
        &copy; 2026 Gilgal Polyclinic Management System
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
