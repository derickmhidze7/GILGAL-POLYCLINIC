<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gilgal Polyclinic — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <th:block layout:fragment="head"></th:block>
</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div class="d-flex" id="wrapper">
    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="bi bi-hospital-fill me-2"></i>Gilgal Polyclinic
            </div>
            <small class="text-muted">Hospital Management</small>
        </div>

        <ul class="sidebar-nav list-unstyled">
            <li th:classappend="${activePage == 'dashboard'} ? 'active'">
                <a th:href="@{/admin/dashboard}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
            </li>
            <li class="nav-section">PRICING</li>
            <li th:classappend="${activePage == 'pricing'} ? 'active'">
                <a th:href="@{/admin/pricing}">
                    <i class="bi bi-tags-fill me-2"></i>Price Catalogue
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="sidebar-user">
                <i class="bi bi-person-circle me-2"></i>
                <span sec:authentication="name">Admin</span>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-sm btn-outline-light w-100 mt-2">
                    <i class="bi bi-box-arrow-left me-1"></i>Logout
                </button>
            </form>
        </div>
    </nav>

    <!-- ================= PAGE CONTENT ================= -->
    <div id="page-content">
        <nav class="top-bar">
            <button type="button" id="sidebarToggle" class="btn btn-link">
                <i class="bi bi-list fs-4"></i>
            </button>
            <div class="top-bar-title" layout:fragment="page-title">Admin</div>
            <div class="ms-auto top-bar-user">
                <i class="bi bi-person-circle me-1"></i>
                <sec:authorize access="isAuthenticated()">
                    <span sec:authentication="name"></span>
                </sec:authorize>
            </div>
        </nav>

        <main class="main-content">
            <!-- Flash messages -->
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <th:block layout:fragment="content"></th:block>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle')?.addEventListener('click', () => {
        document.getElementById('wrapper').classList.toggle('sidebar-collapsed');
    });
    // Close mobile drawer when tapping outside the sidebar
    document.addEventListener('click', function(e) {
        var wrapper = document.getElementById('wrapper');
        var sidebar = document.getElementById('sidebar');
        var toggle  = document.getElementById('sidebarToggle');
        if (window.innerWidth <= 768
            && wrapper && wrapper.classList.contains('sidebar-collapsed')
            && sidebar && !sidebar.contains(e.target)
            && toggle  && !toggle.contains(e.target)) {
            wrapper.classList.remove('sidebar-collapsed');
        }
    });
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
