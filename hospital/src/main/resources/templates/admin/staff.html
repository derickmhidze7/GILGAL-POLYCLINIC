<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{admin/fragments :: head('Staff Management')}"/>
</head>
<body>

<div class="d-flex" id="wrapper">
    <th:block th:replace="~{admin/fragments :: sidebar}"></th:block>

    <div id="page-content">
        <th:block th:replace="~{admin/fragments :: topbar('Staff Management')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{admin/fragments :: alerts}"></th:block>

            <!-- Page header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="mb-0 fw-semibold">Staff Members</h4>
                    <small class="text-muted">Manage hospital staff records</small>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStaffModal">
                    <i class="bi bi-person-plus-fill me-1"></i>Add Staff Member
                </button>
            </div>

            <!-- Search bar -->
            <form th:action="@{/admin/staff}" method="get" class="mb-3">
                <div class="input-group" style="max-width:400px;">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" name="search" class="form-control"
                           placeholder="Search by name or specialization..."
                           th:value="${search}"/>
                    <button class="btn btn-outline-secondary" type="submit">Search</button>
                    <a th:href="@{/admin/staff}" class="btn btn-outline-secondary" th:if="${search != null}">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>

            <!-- Staff table -->
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-3">#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Specialization</th>
                                <th>Department</th>
                                <th>Status</th>
                                <th class="text-end pe-3">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(staffList)}">
                                <td colspan="8" class="text-center py-5 text-muted">
                                    <i class="bi bi-people fs-2 d-block mb-2 opacity-50"></i>
                                    No staff members found.
                                </td>
                            </tr>
                            <tr th:each="s, stat : ${staffList}">
                                <td class="ps-3 text-muted small" th:text="${stat.count}">1</td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="avatar-circle"
                                              th:text="${s.firstName.substring(0,1).toUpperCase()}">A</span>
                                        <div>
                                            <strong th:text="${s.firstName + ' ' + s.lastName}">Name</strong>
                                        </div>
                                    </div>
                                </td>
                                <td th:text="${s.email}">email</td>
                                <td>
                                    <span class="badge role-badge"
                                          th:classappend="${s.staffRole != null ? 'role-' + s.staffRole.name().toLowerCase() : ''}"
                                          th:text="${s.staffRole != null ? s.staffRole.name().replace('_',' ') : '—'}">ROLE</span>
                                </td>
                                <td th:text="${s.specialization != null ? s.specialization : '—'}">—</td>
                                <td th:text="${s.departmentName != null ? s.departmentName : '—'}">—</td>
                                <td>
                                    <span th:if="${s.active}"
                                          class="badge bg-success-subtle text-success border border-success-subtle">
                                        <i class="bi bi-check-circle-fill me-1"></i>Active
                                    </span>
                                    <span th:unless="${s.active}"
                                          class="badge bg-secondary-subtle text-secondary border border-secondary-subtle">
                                        <i class="bi bi-dash-circle-fill me-1"></i>Inactive
                                    </span>
                                </td>
                                <td class="text-end pe-3">
                                    <div class="d-flex justify-content-end gap-1">
                                        <!-- Edit -->
                                        <button class="btn btn-sm btn-outline-primary" title="Edit"
                                                th:attr="
                                                    data-id=${s.id},
                                                    data-firstname=${s.firstName},
                                                    data-lastname=${s.lastName},
                                                    data-email=${s.email},
                                                    data-phone=${s.phone},
                                                    data-role=${s.staffRole != null ? s.staffRole.name() : ''},
                                                    data-specialization=${s.specialization},
                                                    data-license=${s.licenseNumber}"
                                                data-bs-toggle="modal" data-bs-target="#editStaffModal"
                                                onclick="prepareEditStaff(this)">
                                            <i class="bi bi-pencil-fill"></i>
                                        </button>
                                        <!-- Deactivate -->
                                        <form th:action="@{/admin/staff/{id}/deactivate(id=${s.id})}"
                                              method="post" class="d-inline" th:if="${s.active}">
                                            <button type="submit" class="btn btn-sm btn-outline-warning"
                                                    title="Deactivate"
                                                    th:attr="data-name=${s.firstName + ' ' + s.lastName}"
                                                    onclick="return confirm('Deactivate ' + this.dataset.name + '?')">
                                                <i class="bi bi-person-dash-fill"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white border-top-0 py-2 px-3">
                    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                        <small class="text-muted" th:text="${totalStaff} + ' staff member(s) total'">0 total</small>
                        <nav th:if="${totalPages > 1}">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/staff(page=${currentPage - 1})}">&#8249;</a>
                                </li>
                                <th:block th:with="start=${T(java.lang.Math).max(0,currentPage-2)},end=${T(java.lang.Math).min(totalPages-1,start+4)}">
                                    <li class="page-item" th:each="i : ${#numbers.sequence(start,end)}"
                                        th:classappend="${i == currentPage} ? 'active'">
                                        <a class="page-link" th:href="@{/admin/staff(page=${i})}" th:text="${i+1}">1</a>
                                    </li>
                                </th:block>
                                <li class="page-item" th:classappend="${currentPage >= totalPages-1} ? 'disabled'">
                                    <a class="page-link" th:href="@{/admin/staff(page=${currentPage + 1})}">&#8250;</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- ===== Add Staff Modal ===== -->
<div class="modal fade" id="addStaffModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form th:action="@{/admin/staff}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-person-plus-fill me-2 text-primary"></i>Add Staff Member
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">First Name <span class="text-danger">*</span></label>
                            <input type="text" name="firstName" class="form-control" required maxlength="80"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Last Name <span class="text-danger">*</span></label>
                            <input type="text" name="lastName" class="form-control" required maxlength="80"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" required maxlength="150"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Phone</label>
                            <input type="text" name="phone" class="form-control" maxlength="30"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Role <span class="text-danger">*</span></label>
                            <select name="staffRole" class="form-select" required>
                                <option value="" disabled selected>— Select role —</option>
                                <option th:each="r : ${roles}"
                                        th:value="${r.name()}"
                                        th:text="${r.name().replace('_',' ')}">ROLE</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="">— Select —</option>
                                <option th:each="g : ${genders}" th:value="${g.name()}" th:text="${g.name()}">G</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Specialization</label>
                            <input type="text" name="specialization" class="form-control" maxlength="150"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">License Number</label>
                            <input type="text" name="licenseNumber" class="form-control" maxlength="80"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Employment Date</label>
                            <input type="date" name="employmentDate" class="form-control"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Date of Birth</label>
                            <input type="date" name="dateOfBirth" class="form-control"/>
                        </div>
                        <div class="col-12" th:if="${not #lists.isEmpty(departments)}">
                            <label class="form-label fw-medium">Department</label>
                            <select name="departmentId" class="form-select">
                                <option value="">— None —</option>
                                <option th:each="d : ${departments}"
                                        th:value="${d.id}"
                                        th:text="${d.name}">Dept</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Create Staff Member
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== Edit Staff Modal ===== -->
<div class="modal fade" id="editStaffModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <form id="editStaffForm" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil-fill me-2 text-warning"></i>Edit Staff Member
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-medium">First Name <span class="text-danger">*</span></label>
                            <input type="text" name="firstName" id="edit-firstName" class="form-control" required maxlength="80"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Last Name <span class="text-danger">*</span></label>
                            <input type="text" name="lastName" id="edit-lastName" class="form-control" required maxlength="80"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" id="edit-email" class="form-control" required maxlength="150"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Phone</label>
                            <input type="text" name="phone" id="edit-phone" class="form-control" maxlength="30"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Role <span class="text-danger">*</span></label>
                            <select name="staffRole" id="edit-role" class="form-select" required>
                                <option th:each="r : ${roles}"
                                        th:value="${r.name()}"
                                        th:text="${r.name().replace('_',' ')}">ROLE</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">Specialization</label>
                            <input type="text" name="specialization" id="edit-specialization" class="form-control" maxlength="150"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-medium">License Number</label>
                            <input type="text" name="licenseNumber" id="edit-license" class="form-control" maxlength="80"/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{admin/fragments :: scripts}"></th:block>
<script>
function prepareEditStaff(btn) {
    const id = btn.dataset.id;
    document.getElementById('editStaffForm').action = '/admin/staff/' + id + '/edit';
    document.getElementById('edit-firstName').value = btn.dataset.firstname || '';
    document.getElementById('edit-lastName').value  = btn.dataset.lastname  || '';
    document.getElementById('edit-email').value     = btn.dataset.email     || '';
    document.getElementById('edit-phone').value     = btn.dataset.phone     || '';
    document.getElementById('edit-specialization').value = btn.dataset.specialization || '';
    document.getElementById('edit-license').value   = btn.dataset.license   || '';
    const roleSelect = document.getElementById('edit-role');
    for (let opt of roleSelect.options) {
        opt.selected = opt.value === btn.dataset.role;
    }
}
</script>
</body>
</html>
