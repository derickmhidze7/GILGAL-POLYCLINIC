<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{admin/fragments :: head('Expense Analytics')}"></th:block>
</head>
<body>

<div class="d-flex" id="wrapper">
    <th:block th:replace="~{admin/fragments :: sidebar}"></th:block>

    <div id="page-content">
        <th:block th:replace="~{admin/fragments :: topbar('Expense Analytics')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{admin/fragments :: alerts}"></th:block>

            <!-- ── Summary cards ────────────────────────────────────────── -->
            <div class="row g-4 mb-4">
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card stat-card--blue">
                        <div class="stat-card__icon"><i class="bi bi-calendar-month"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value"
                                 th:text="'TZS /= ' + ${#numbers.formatDecimal(analytics.totalThisMonth, 1, 'COMMA', 2, 'POINT')}">
                                TZS /= 0.00
                            </div>
                            <div class="stat-card__label">This Month Total</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card stat-card--green">
                        <div class="stat-card__icon"><i class="bi bi-calendar3"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value"
                                 th:text="'TZS /= ' + ${#numbers.formatDecimal(analytics.totalThisYear, 1, 'COMMA', 2, 'POINT')}">
                                TZS /= 0.00
                            </div>
                            <div class="stat-card__label">This Year Total</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card stat-card--orange">
                        <div class="stat-card__icon"><i class="bi bi-hourglass-split"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${analytics.pendingApprovals}">0</div>
                            <div class="stat-card__label">Pending Approvals</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="stat-card stat-card--red">
                        <div class="stat-card__icon"><i class="bi bi-x-circle"></i></div>
                        <div class="stat-card__body">
                            <div class="stat-card__value" th:text="${analytics.rejectedCount}">0</div>
                            <div class="stat-card__label">Rejected Expenses</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Charts row ────────────────────────────────────────────── -->
            <div class="row g-4 mb-4">

                <!-- Category Breakdown (Horizontal Bar) -->
                <div class="col-12 col-lg-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white fw-semibold">
                            <i class="bi bi-bar-chart-horizontal me-2 text-primary"></i>
                            Expenses by Category (This Year)
                        </div>
                        <div class="card-body">
                            <canvas id="categoryChart" height="260"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Monthly Trend (Line) -->
                <div class="col-12 col-lg-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-header bg-white fw-semibold">
                            <i class="bi bi-graph-up me-2 text-success"></i>
                            Monthly Trend (Last 12 Months)
                        </div>
                        <div class="card-body">
                            <canvas id="trendChart" height="260"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── Navigation ────────────────────────────────────────────── -->
            <div class="d-flex gap-2 mb-2">
                <a th:href="@{/admin/expenses}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i>Back to Expenses
                </a>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="~{admin/fragments :: scripts}"></th:block>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    // ── Category breakdown ─────────────────────────────────────────────────
    const catLabels  = /*[[${catLabels}]]*/ [];
    const catTotals  = /*[[${catTotals}]]*/ [];
    const catColours = /*[[${catColours}]]*/ [];

    new Chart(document.getElementById('categoryChart'), {
        type: 'bar',
        data: {
            labels: catLabels,
            datasets: [{
                label: 'Amount (TZS /=)',
                data: catTotals,
                backgroundColor: catColours,
                borderRadius: 4
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => 'TZS /= ' + ctx.parsed.x.toLocaleString(undefined, {minimumFractionDigits: 2})
                    }
                }
            },
            scales: {
                x: {
                    ticks: {
                        callback: v => 'TZS ' + Number(v).toLocaleString()
                    }
                }
            }
        }
    });

    // ── Monthly trend ──────────────────────────────────────────────────────
    const trendLabels = /*[[${trendLabels}]]*/ [];
    const trendTotals = /*[[${trendTotals}]]*/ [];

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: trendLabels,
            datasets: [{
                label: 'Expenses (TZS /=)',
                data: trendTotals,
                borderColor: '#4e73df',
                backgroundColor: 'rgba(78,115,223,0.1)',
                tension: 0.3,
                fill: true,
                pointRadius: 4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => 'TZS /= ' + ctx.parsed.y.toLocaleString(undefined, {minimumFractionDigits: 2})
                    }
                }
            },
            scales: {
                y: {
                    ticks: {
                        callback: v => 'TZS ' + Number(v).toLocaleString()
                    }
                }
            }
        }
    });
    /*]]>*/
</script>
</body>
</html>
