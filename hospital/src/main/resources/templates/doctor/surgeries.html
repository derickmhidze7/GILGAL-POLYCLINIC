<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <th:block th:replace="~{doctor/fragments :: head('Surgeries')}"></th:block>
</head>
<body>

<div class="d-flex" id="wrapper">
    <th:block th:replace="~{doctor/fragments :: sidebar}"></th:block>

    <div id="page-content">
        <th:block th:replace="~{doctor/fragments :: topbar('Surgery Orders')}"></th:block>

        <main class="main-content">
            <th:block th:replace="~{doctor/fragments :: alerts}"></th:block>

            <!-- Page header -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h5 class="fw-bold mb-0">
                        <i class="bi bi-scissors text-primary me-2"></i>Surgery Orders
                    </h5>
                    <small class="text-muted">Surgical procedures you have scheduled for your patients</small>
                </div>
                <span class="badge bg-primary fs-6"
                      th:text="${#lists.size(surgeries)} + ' order(s)'">0</span>
            </div>

            <!-- Filter bar -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body py-2">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-5">
                            <div class="input-group input-group-sm">
                                <span class="input-group-text"><i class="bi bi-search"></i></span>
                                <input type="text" id="searchInput" class="form-control"
                                       placeholder="Search patient, procedure…">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select id="filterStatus" class="form-select form-select-sm">
                                <option value="">All statuses</option>
                                <option value="SCHEDULED">Scheduled</option>
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="CANCELLED">Cancelled</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select id="filterUrgency" class="form-select form-select-sm">
                                <option value="">All urgencies</option>
                                <option value="ELECTIVE">Elective</option>
                                <option value="URGENT">Urgent</option>
                                <option value="EMERGENCY">Emergency</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty state -->
            <div th:if="${#lists.isEmpty(surgeries)}" class="text-center py-5">
                <i class="bi bi-scissors display-1 text-muted"></i>
                <p class="mt-3 text-muted">No surgery orders found. Schedule one from a consultation.</p>
            </div>

            <!-- Surgery table -->
            <div th:if="${!#lists.isEmpty(surgeries)}" class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="surgeriesTable">
                            <thead class="table-light">
                            <tr>
                                <th>Patient</th>
                                <th>Procedure</th>
                                <th>Type</th>
                                <th>Urgency</th>
                                <th>Scheduled</th>
                                <th>Theater</th>
                                <th>Status</th>
                                <th>Consent</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="s : ${surgeries}" class="surgery-row"
                                th:data-patient="${s.patientName}"
                                th:data-procedure="${s.procedureName}"
                                th:data-status="${s.status}"
                                th:data-urgency="${s.urgency}">
                                <td>
                                    <div class="fw-semibold" th:text="${s.patientName}">Name</div>
                                    <small class="text-muted" th:text="${s.patientMrn}"></small>
                                </td>
                                <td th:text="${s.procedureName}">—</td>
                                <td><span class="badge bg-secondary" th:text="${s.surgeryType}">—</span></td>
                                <td>
                                    <span th:class="${s.urgency == 'EMERGENCY' ? 'badge bg-danger' :
                                                   (s.urgency == 'URGENT' ? 'badge bg-warning text-dark' : 'badge bg-success')}"
                                          th:text="${s.urgency}">—</span>
                                </td>
                                <td>
                                    <span th:if="${s.scheduledDate != null}"
                                          th:text="${#temporals.format(s.scheduledDate,'dd MMM yyyy HH:mm')}">—</span>
                                    <span th:if="${s.scheduledDate == null}" class="text-muted">TBD</span>
                                </td>
                                <td th:text="${s.operatingTheater ?: '—'}">—</td>
                                <td>
                                    <span th:class="${s.status == 'COMPLETED' ? 'badge bg-success' :
                                                   (s.status == 'IN_PROGRESS' ? 'badge bg-warning text-dark' :
                                                   (s.status == 'CANCELLED' ? 'badge bg-danger' : 'badge bg-primary'))}"
                                          th:text="${s.status}">—</span>
                                </td>
                                <td>
                                    <i th:if="${s.consentObtained}" class="bi bi-check-circle-fill text-success"></i>
                                    <i th:if="${!s.consentObtained}" class="bi bi-x-circle-fill text-danger"></i>
                                </td>
                                <td>
                                    <a th:href="@{/doctor/surgeries/{id}(id=${s.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye me-1"></i>View
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<script>
// Live filter
const searchInput  = document.getElementById('searchInput');
const filterStatus = document.getElementById('filterStatus');
const filterUrgency = document.getElementById('filterUrgency');

function applyFilter() {
    const q = searchInput ? searchInput.value.toLowerCase() : '';
    const s = filterStatus ? filterStatus.value : '';
    const u = filterUrgency ? filterUrgency.value : '';
    document.querySelectorAll('.surgery-row').forEach(row => {
        const patient   = (row.dataset.patient || '').toLowerCase();
        const procedure = (row.dataset.procedure || '').toLowerCase();
        const status    = row.dataset.status || '';
        const urgency   = row.dataset.urgency || '';
        const matchQ = !q || patient.includes(q) || procedure.includes(q);
        const matchS = !s || status === s;
        const matchU = !u || urgency === u;
        row.style.display = (matchQ && matchS && matchU) ? '' : 'none';
    });
}

if (searchInput) searchInput.addEventListener('input', applyFilter);
if (filterStatus) filterStatus.addEventListener('change', applyFilter);
if (filterUrgency) filterUrgency.addEventListener('change', applyFilter);
</script>

</body>
</html>
