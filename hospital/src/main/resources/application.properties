spring.application.name=Gilgal-Polyclinic-Management-System

# =============================================
#  SERVER
# =============================================
server.port=8080
# Trust forwarded headers from reverse proxies / dev tunnels (VS Code port-forwarding, ngrok, etc.)
# This prevents Spring from appending :8080 to redirect URLs when accessed through a tunnel.
server.forward-headers-strategy=NATIVE

# =============================================
#  ACTIVE PROFILE  (override per environment)
# =============================================
spring.profiles.active=dev

# =============================================
#  FLYWAY — disabled, using ddl-auto instead
# =============================================
spring.flyway.enabled=false

# =============================================
#  JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false
# Defer Spring SQL init until AFTER Hibernate ddl-auto=update has created/altered tables.
# This ensures schema.sql (which references stock_batches) runs after Hibernate creates it.
spring.jpa.defer-datasource-initialization=true

# =============================================
#  SQL INITIALISATION (schema.sql)
# =============================================
# Run schema.sql on every startup so DB constraint patches are applied automatically.
# continue-on-error=true makes the ALTER statements idempotent (safe to re-run).
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# =============================================
#  JWT
# =============================================
# WARNING: The fallback value below is for LOCAL DEVELOPMENT ONLY.
# In production, always set the JWT_SECRET environment variable to a strong
# randomly generated secret (min 64 chars). NEVER commit a real secret here.
app.jwt.secret=${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvckhvc3BpdGFsTWFuYWdlbWVudFN5c3RlbUFEQUdTMjAyNg==}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# =============================================
#  SPRINGDOC / SWAGGER UI
# =============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.packages-to-scan=com.adags.hospital.controller

# =============================================
#  ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# =============================================
#  LOGGING
# =============================================
logging.level.com.adags.hospital=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# =============================================
#  MULTIPART FILE UPLOAD
# =============================================
# Spring Boot 4.0.2 sets server.tomcat.max-part-count = 10 by default.
# ALL parts in a multipart request (text fields + file inputs) count toward this limit.
# The result-entry form has 30+ fields, so we raise it here.
server.tomcat.max-part-count=1000
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
